<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable icon (Android adaptive). Full-bleed, sin border-radius:
       el sistema operativo aplica la máscara. Safe zone = circulo
       central del 80%. La "B" sigue cabiendo holgada en esa zona. -->
  <rect width="512" height="512" fill="#7131E1"/>
  <text x="256" y="256"
        font-family="'Space Grotesk', system-ui, -apple-system, sans-serif"
        font-size="320"
        font-weight="800"
        fill="white"
        text-anchor="middle"
        dominant-baseline="central"
        letter-spacing="-0.04em">B</text>
</svg>
